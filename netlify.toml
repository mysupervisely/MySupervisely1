[build]
  command = "npm run build"
  publish = "dist/client"
[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/webhooks/stripe"
  to = "/.netlify/functions/stripe-webhook"
  status = 200
  force = true

[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/create-checkout-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/booking"
  to = "/.netlify/functions/create-booking"
  status = 200
  force = true

[[redirects]]
  from = "/api/survey"
  to = "/.netlify/functions/submit-survey"
  status = 200
  force = true
