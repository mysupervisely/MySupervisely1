<!DOCTYPE html>
<html>
  <body>
    <!-- Static form for Netlify to detect at build time. Never shown to users. -->
    <form name="career-intern-application" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="licenseStatus" />
      <input type="text" name="hoursRemaining" />
      <input type="text" name="region" />
      <input type="text" name="employmentType" />
      <input type="text" name="specialties" />
      <input type="text" name="alsoSeekingSupervision" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
