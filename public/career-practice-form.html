<!DOCTYPE html>
<html>
  <body>
    <!-- Static form for Netlify to detect at build time. Never shown to users. -->
    <form name="career-practice-application" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="practiceName" />
      <input type="email" name="email" />
      <input type="text" name="location" />
      <input type="text" name="roleType" />
      <input type="text" name="employmentType" />
      <input type="text" name="compensation" />
      <input type="text" name="specialties" />
      <input type="text" name="alsoOfferingSupervision" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
