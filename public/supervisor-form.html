<!DOCTYPE html>
<html>
  <body>
    <!-- Static form for Netlify to detect at build time. Never shown to users. -->
    <form name="supervisor-application" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="licenseType" />
      <input type="text" name="qualifiedSupervisor" />
      <input type="text" name="format" />
      <input type="text" name="specialties" />
      <input type="text" name="privatePractice" />
      <input type="text" name="fee" />
      <input type="text" name="availability" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
